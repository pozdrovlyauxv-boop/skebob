<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Skebob Game</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; user-select: none; }
        .header { background: #1e1e1e; padding: 15px; border-bottom: 2px solid gold; position: sticky; top: 0; z-index: 100; }
        .tab-content { display: none; padding: 20px; padding-bottom: 100px; }
        .active { display: block; }
        .card { background: #222; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; }
        button { background: gold; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; color: black; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e1e1e; border-top: 1px solid #333; z-index: 100; }
        .nav-item { flex: 1; padding: 15px; font-size: 0.6em; color: #888; text-transform: uppercase; }
        .active-nav { color: gold; border-top: 2px solid gold; }
        #skebob-img { width: 180px; margin: 20px; transition: 0.1s; cursor: pointer; }
        #skebob-img:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div class="header">
    <h1 id="bal">0 🫘</h1>
    <div id="inc-dis">Доход: 0 /ч</div>
</div>

<div id="t_shop" class="tab-content">
    <h3>Магазин Яиц</h3>
    <div class="card">Редкое (50к)<button onclick="buyEgg('rare')">Открыть</button></div>
    <div class="card">Эпик (200к)<button onclick="buyEgg('epic')">Открыть</button></div>
    <div class="card">Легенда (1М)<button onclick="buyEgg('legendary')">Открыть</button></div>
</div>

<div id="t_upg" class="tab-content">
    <h3>Улучшения (от 1000)</h3>
    <div class="card">Сила клика (x<span id="cm-v">1.0</span>)<button id="u_c" onclick="buyU('c')">1000</button></div>
    <div class="card">Сборщик (+100/ч)<button id="u_a" onclick="buyU('a')">2500</button></div>
    <div class="card">Множитель дохода<button id="u_i" onclick="buyU('i')">5000</button></div>
    <div class="card">Склад (Лимит +1)<button id="u_e" onclick="buyU('e')">10000</button></div>
    <div class="card">Энергетик (+5 к тапу)<button id="u_p" onclick="buyU('p')">1500</button></div>
    <div class="card">Удача (+0.5% к шансу)<button id="u_l" onclick="buyU('l')">50000</button></div>
</div>

<div id="t_main" class="tab-content active">
    <img id="skebob-img" src="skebob.jpg" onclick="tap()" onerror="this.src='https://via.placeholder.com'">
    <h2 id="name">Скебоб</h2>
</div>

<div id="t_mark" class="tab-content">
    <h3>Рынок (48ч выкуп)</h3>
    <div id="my-lots"></div>
    <button onclick="sellCurrent()" style="background: #4CAF50; color: white;">Выставить текущего</button>
</div>

<nav class="nav">
    <div class="nav-item" onclick="showTab('shop', this)">Магазин</div>
    <div class="nav-item" onclick="showTab('upgrades', this)">Апгрейды</div>
    <div class="nav-item active-nav" onclick="showTab('main', this)">Скебоб</div>
    <div class="nav-item" onclick="showTab('mark', this)">Рынок</div>
</nav>

<script>
    const urlP = new URLSearchParams(window.location.search);
    let beans = parseFloat(urlP.get('b')) || 0;
    let cm = parseFloat(urlP.get('cm')) || 1.0;
    let im = parseFloat(urlP.get('im')) || 1.0;
    let cp = parseInt(urlP.get('cp')) || 1;
    let ai = parseInt(urlP.get('ai')) || 0;
    let el = parseInt(urlP.get('el')) || 10;
    let lk = parseFloat(urlP.get('lk')) || 0;
    let bob = urlP.get('bob') || 'normal';
    
    let myLots = JSON.parse(localStorage.getItem('myLots')) || [];
    let costs = JSON.parse(localStorage.getItem('costs')) || { c: 1000, a: 2500, i: 5000, e: 10000, p: 1500, l: 50000 };

    const bData = {
        normal: { n: 'Скебоб', i: 0, c: '#fff' },
        rare: { n: 'Редкий Скебоб', i: 10000, c: '#007bff' },
        epic: { n: 'Эпик Скебоб', i: 50000, c: '#a335ee' },
        legendary: { n: 'Легенда Скебоб', i: 500000, c: '#ffcc00' }
    };

    function updateUI() {
        document.getElementById('bal').innerText = Math.floor(beans).toLocaleString();
        let totalInc = Math.round((ai + (bData[bob]?.i || 0)) * im);
        document.getElementById('inc-dis').innerText = "Доход: " + totalInc.toLocaleString() + " /ч";
        document.getElementById('name').innerText = bData[bob]?.n || "Скебоб";
        document.getElementById('name').style.color = bData[bob]?.c || "#fff";
        document.getElementById('cm-v').innerText = cm.toFixed(1);
        for(let k in costs) { if(document.getElementById('u_'+k)) document.getElementById('u_'+k).innerText = costs[k].toLocaleString(); }
        renderLots();
    }

    function buyU(t) {
        if(beans < costs[t]) return alert("Мало бобов!");
        beans -= costs[t];
        if(t==='c') cm += 0.2; if(t==='a') ai += 100; if(t==='i') im += 0.15; if(t==='e') el += 1; if(t==='p') cp += 5; if(t==='l') lk += 0.5;
        costs[t] = Math.round(costs[t] * 1.7);
        save(); updateUI();
    }

    function buyEgg(t) {
        const prices = { rare: 50000, epic: 200000, legendary: 1000000 };
        if(beans < prices[t]) return alert("Мало бобов!");
        beans -= prices[t];
        let r = Math.random()*100; let res = 'rare';
        if(t==='rare'){ if(r < 1+lk) res='legendary'; else if(r < 30) res='epic'; }
        else if(t==='epic'){ if(r < 5+lk) res='legendary'; else if(r < 80) res='epic'; }
        else { if(r < 12+lk) res='legendary'; else if(r < 80) res='epic'; }
        bob = res; save(); updateUI(); alert("Выпал: " + bData[res].n);
    }

    function sellCurrent() {
        if(bob === 'normal') return alert("Обычного нельзя продать!");
        let price = (bData[bob]?.i || 0) * 10;
        myLots.push({ n: bData[bob].n, p: price, end: Date.now() + (48*3600*1000), c: bData[bob].c });
        bob = 'normal'; save(); updateUI();
    }

    function renderLots() {
        const cont = document.getElementById('my-lots');
        cont.innerHTML = myLots.length ? '' : '<p>Нет активных лотов</p>';
        myLots.forEach((l, i) => {
            let left = l.end - Date.now();
            let isReady = left <= 0;
            cont.innerHTML += `<div class="card"><span style="color:${l.c}">${l.n}</span><br>
            ${isReady ? `<button onclick="claim(${i})">Забрать ${l.p}</button>` : `Выкуп через ${Math.max(0, Math.floor(left/3600000))}ч`}</div>`;
        });
    }

    function claim(i) { beans += myLots[i].p; myLots.splice(i, 1); save(); updateUI(); }
    function tap() { beans += (cp * cm); updateUI(); }
    function save() { 
        localStorage.setItem('beans', beans); localStorage.setItem('bob', bob); 
        localStorage.setItem('myLots', JSON.stringify(myLots)); localStorage.setItem('costs', JSON.stringify(costs));
    }
    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById('t_'+id).classList.add('active'); el.classList.add('active-nav');
    }
    setInterval(() => { beans += (((ai + (bData[bob]?.i || 0)) * im) / 3600); updateUI(); }, 1000);
    updateUI();
</script>
</body>
</html>
