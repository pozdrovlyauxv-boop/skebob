<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Skebob Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; user-select: none; overflow-x: hidden; }
        .header { background: #1e1e1e; padding: 15px; border-bottom: 2px solid gold; position: sticky; top: 0; z-index: 100; }
        #bal { font-size: 2em; margin: 0; color: gold; }
        
        /* Стили вкладок */
        .tab-content { display: none; padding: 20px; padding-bottom: 100px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card { background: #222; padding: 15px; margin: 12px 0; border-radius: 16px; border: 1px solid #333; }
        
        /* Кнопки */
        button { background: gold; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; color: black; margin-top: 5px; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        
        /* Уведомление (Toast) */
        #toast { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            padding: 15px 25px; border-radius: 12px; display: none; z-index: 9999; 
            font-weight: bold; color: white; width: 80%; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .error { background: #ff4444; border: 2px solid #b71c1c; } /* Красный если мало бобов */
        .success { background: #4caf50; border: 2px solid #1b5e20; } /* Зеленый если купил */

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e1e1e; border-top: 1px solid #333; }
        .nav-item { flex: 1; padding: 15px 5px; font-size: 0.65em; color: #888; text-transform: uppercase; cursor: pointer; }
        .active-nav { color: gold; border-top: 3px solid gold; }

        #skebob-img { width: 180px; height: 180px; margin: 20px; border-radius: 50%; border: 4px solid #333; cursor: pointer; }
    </style>
</head>
<body>

<!-- Всплывающее уведомление -->
<div id="toast"></div>

<div class="header">
    <h1 id="bal">0 🫘</h1>
    <p style="margin:0; color:#aaa;">Твой баланс</p>
</div>

<!-- ВКЛАДКА ГЛАВНАЯ -->
<div id="t_main" class="tab-content active">
    <img id="skebob-img" src="skebob.jpg" onclick="tap()" onerror="this.src='https://via.placeholder.com/180?text=TAP'">
    <h2>Скебоб</h2>
    <p>Сила клика: <span id="cm-v">1.0</span></p>
</div>

<!-- ВКЛАДКА АПГРЕЙДЫ -->
<div id="t_upg" class="tab-content">
    <h3>Улучшения</h3>
    
    <div class="card">
        <h4>💪 Сила клика</h4>
        <p>Дает больше бобов за каждый тап</p>
        <!-- Кнопка с ценой -->
        <button id="btn-upg-click" onclick="buyU('c')">Улучшить (1000 🫘)</button>
    </div>

    <div class="card">
        <h4>🤖 Авто-кликер</h4>
        <button onclick="showToast('Скоро в игре!', 'error')">Купить</button>
    </div>
</div>

<!-- ВКЛАДКА ПОДДЕРЖКА -->
<div id="t_supp" class="tab-content">
    <h3>Поддержка</h3>
    <div class="card">
        <p>Есть вопросы?</p>
        <button onclick="openSupport()">Написать админу</button>
    </div>
</div>

<!-- МЕНЮ -->
<nav class="nav">
    <div class="nav-item active-nav" onclick="showT('main', this)">Главная</div>
    <div class="nav-item" onclick="showT('upg', this)">Улучшения</div>
    <div class="nav-item" onclick="showT('supp', this)">Поддержка</div>
</nav>

<script>
    // 1. Получаем данные игрока из ссылки
    const urlParams = new URLSearchParams(window.location.search);
    let user = {
        uid: urlParams.get('uid') || "0",
        beans: parseFloat(urlParams.get('b')) || 0,
        cm: parseFloat(urlParams.get('cm')) || 1.0
    };

    // 2. Обновление текста на экране
    function updateUI() {
        // Баланс
        document.getElementById('bal').innerText = Math.floor(user.beans).toLocaleString() + " 🫘";
        // Сила клика
        document.getElementById('cm-v').innerText = user.cm.toFixed(1);
        
        // Расчет цены (сила клика * 1000)
        let price = Math.floor(user.cm * 1000);
        document.getElementById('btn-upg-click').innerText = `Улучшить (${price.toLocaleString()} 🫘)`;
    }

    // 3. Клик (Тап)
    function tap() {
        user.beans += (1 * user.cm);
        updateUI();
        saveData();
    }

    // 4. ПОКУПКА УЛУЧШЕНИЯ
    function buyU(type) {
        if (type === 'c') {
            let price = Math.floor(user.cm * 1000);

            // ПРОВЕРКА: Хватает ли бобов?
            if (user.beans >= price) {
                // Если хватает:
                user.beans -= price; // Списываем
                user.cm += 0.5;      // Добавляем силу клика
                showToast("Успешно улучшено!", "success");
                updateUI();
                saveData();
            } else {
                // Если НЕ хватает:
                let need = price - Math.floor(user.beans);
                showToast("Недостаточно бобов! Нужно еще " + need, "error");
            }
        }
    }

    // 5. Переключение вкладок
    function showT(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById('t_' + tabId).classList.add('active');
        el.classList.add('active-nav');
    }

    // 6. Уведомления
    function showToast(text, type) {
        const t = document.getElementById('toast');
        t.innerText = text;
        t.className = type; // error или success
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2000);
    }

    // 7. Поддержка
    function openSupport() {
        const link = 'https://t.me/Ktotojko'; // ЗАМЕНИ НА СВОЙ НИК
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.openTelegramLink(link);
        } else {
            window.open(link, '_blank');
        }
    }

    // 8. Сохранение на сервер Amvera
    async function saveData() {
        const API = 'https://amvera-dfgbd-run-skebob.amvera.io'; // ЗАМЕНИ НА СВОЙ URL
        try {
            fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    uid: user.uid,
                    beans: user.beans,
                    cm: user.cm,
                    im: 1.0, cp: 1, ai: 0, el: 10, lk: 0, bob: 'normal'
                })
            });
        } catch(e) {}
    }

    // Инициализация
    updateUI();
    if(window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }
</script>

</body>
</html>
