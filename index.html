<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Skebob Game</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; overflow: hidden; }
        .header { background: #1e1e1e; padding: 15px; border-bottom: 2px solid #ffd700; }
        #balance { font-size: 2.5em; color: #ffd700; margin: 0; }
        .tab-content { display: none; height: 70vh; overflow-y: auto; padding: 20px; }
        .active { display: block; }
        
        /* Главный Скебоб */
        #skebob-img { width: 250px; margin-top: 50px; cursor: pointer; transition: transform 0.05s; -webkit-user-drag: none; }
        #skebob-img:active { transform: scale(0.95); }

        /* Магазин */
        .card { background: #252525; padding: 15px; margin: 10px 0; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #ffd700; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; }
        
        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e1e1e; border-top: 1px solid #333; }
        .nav-item { flex: 1; padding: 15px; cursor: pointer; font-size: 0.8em; color: #888; }
        .nav-item.active-nav { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="balance">0 🫘</h1>
    <div id="per-hour">Доход: +0/ч</div>
</div>

<!-- Вкладки -->
<div id="tab1" class="tab-content active">
  <img id="skebob-img" src="skebob.jpg" alt="Скебоб">
    <p>Тапай бобы!</p>
</div>

<div id="tab2" class="tab-content">
    <h3>Прокачка Скебоба</h3>
    <div class="card">
        <span>+2 к клику<br><small>Цена: 2,000,000</small></span>
        <button onclick="buyUpgrade(2000000, 2)">Купить</button>
    </div>
    <div class="card">
        <span>+3 к клику<br><small>Цена: 10,000,000</small></span>
        <button onclick="buyUpgrade(10000000, 3)">Купить</button>
    </div>
    <div class="card">
        <span>+20 к клику<br><small>Цена: 100,000,000</small></span>
        <button onclick="buyUpgrade(100000000, 20)">Купить</button>
    </div>
</div>

<div id="tab3" class="tab-content">
    <h3>Друзья</h3>
    <p>Обычный: +500,000 🫘</p>
    <p>Premium: +1,000,000 🫘</p>
    <button onclick="alert('Ссылка в боте!')">Пригласить</button>
</div>

<div id="tab4" class="tab-content">
    <h3>TikTok Автор</h3>
    <p>Нравится игра? Выложи видео в TikTok и отметь:</p>
    <h2 style="color: #fe2c55;">Ktotojko</h2>
</div>

<div class="nav">
    <div class="nav-item active-nav" onclick="showTab(1, this)">Тапалка</div>
    <div class="nav-item" onclick="showTab(2, this)">Улучшения</div>
    <div class="nav-item" onclick="showTab(3, this)">Друзья</div>
    <div class="nav-item" onclick="showTab(4, this)">TikTok</div>
</div>

<script>
    let beans = parseFloat(localStorage.getItem('beans')) || 0;
    let power = parseInt(localStorage.getItem('power')) || 1;

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(beans).toLocaleString() + " 🫘";
        localStorage.setItem('beans', beans);
        localStorage.setItem('power', power);
    }

    document.getElementById('skebob-img').addEventListener('click', (e) => {
        beans += power;
        updateUI();
    });

    function buyUpgrade(cost, add) {
        if (beans >= cost) {
            beans -= cost;
            power += add;
            updateUI();
        } else { alert("Мало бобов!"); }
    }

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById('tab' + id).classList.add('active');
        el.classList.add('active-nav');
    }
    updateUI();
</script>
</body>
</html>
