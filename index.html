<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Skebob Ultimate</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; user-select: none; overflow-x: hidden; }
        .header { background: #1e1e1e; padding: 15px; border-bottom: 2px solid gold; position: sticky; top: 0; z-index: 100; }
        #bal { font-size: 2em; margin: 0; color: gold; }
        #inc-dis { font-size: 0.85em; color: #aaa; margin-top: 5px; }
        .tab-content { display: none; padding: 20px; padding-bottom: 100px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: #222; padding: 15px; margin: 12px 0; border-radius: 16px; border: 1px solid #333; position: relative; }
        .chance-tag { font-size: 0.7em; display: block; margin: 8px 0; color: #aaa; }
        .rare-t { color: #3498db; } .epic-t { color: #9b59b6; } .leg-t { color: #f1c40f; }
        .name-normal { color: white; }
        .name-rare { color: #3498db; text-shadow: 0 0 8px #3498db; }
        .name-epic { color: #9b59b6; text-shadow: 0 0 8px #9b59b6; }
        .name-leg { color: #f1c40f; text-shadow: 0 0 12px #f1c40f; }
        button { background: gold; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; color: black; margin-top: 5px; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e1e1e; border-top: 1px solid #333; z-index: 100; overflow-x: auto; }
        .nav-item { flex: 1; min-width: 70px; padding: 15px 5px; font-size: 0.6em; color: #888; text-transform: uppercase; cursor: pointer; }
        .active-nav { color: gold; border-top: 3px solid gold; background: rgba(255,215,0,0.05); }
        #skebob-img { width: 180px; height: 180px; margin: 20px; border-radius: 50%; border: 4px solid #333; cursor: pointer; transition: 0.1s; object-fit: cover; }
        .toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 10px; display: none; z-index: 3000; width: 80%; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="header">
    <h1 id="bal">0 🫘</h1>
    <div id="inc-dis">Доход: 0 /ч</div>
</div>

<!-- ВКЛАДКИ -->
<div id="t_shop" class="tab-content">
    <h3>Инкубатор</h3>
    <div class="card"><h4>Редкое (50к)</h4><button onclick="openEgg('rare_egg')">Открыть</button></div>
    <div class="card"><h4>Эпик (200к)</h4><button onclick="openEgg('epic_egg')">Открыть</button></div>
    <div class="card"><h4>Легенда (1М)</h4><button onclick="openEgg('leg_egg')">Открыть</button></div>
</div>

<div id="t_upg" class="tab-content">
    <h3>Улучшения</h3>
    <div class="card">Клик (x<span id="cm-v">1.0</span>)<button onclick="buyU('c')">Улучшить</button></div>
    <div class="card">Авто (+100/ч)<button onclick="buyU('a')">Улучшить</button></div>
</div>

<div id="t_main" class="tab-content active">
    <img id="skebob-img" src="skebob.jpg" onclick="tap()" onerror="this.src='https://via.placeholder.com'">
    <h2 id="name" class="name-normal">Скебоб</h2>
</div>

<div id="t_task" class="tab-content">
    <h3>Задания</h3>
    <div class="card">Пригласи 1 друга<button onclick="checkTask(1, 5000)">Проверить</button></div>
</div>

<div id="t_mark" class="tab-content">
    <h3>Рынок</h3>
    <div class="card"><p id="m-name">Скебоб</p><button onclick="sellBob()">Продать (50%)</button></div>
</div>

<div id="t_supp" class="tab-content">
    <h3>Поддержка</h3>
    <button onclick="window.open('https://t.me')">Написать админу</button>
</div>

<nav class="nav">
    <div class="nav-item" onclick="showT('shop', this)">Магазин</div>
    <div class="nav-item" onclick="showT('upg', this)">Апгрейды</div>
    <div class="nav-item active-nav" onclick="showT('main', this)">Скебоб</div>
    <div class="nav-item" onclick="showT('task', this)">Задания</div>
    <div class="nav-item" onclick="showT('mark', this)">Рынок</div>
    <div class="nav-item" onclick="showT('supp', this)">Поддержка</div>
</nav>

<script>
    const urlP = new URLSearchParams(window.location.search);
    // !!! ЗАМЕНИТЕ ССЫЛКУ НИЖЕ НА ВАШУ ИЗ NGROK !!!
    const SERVER_URL = "https://chi-patellar-ozell.ngrok-free.dev"; 

    let beans = parseFloat(urlP.get('b')) || 0;
    let cm = parseFloat(urlP.get('cm')) || 1.0;
    let im = parseFloat(urlP.get('im')) || 1.0;
    let ai = parseInt(urlP.get('ai')) || 0;
    let bob = urlP.get('bob') || 'normal';
    let refs = parseInt(urlP.get('refs')) || 0;

    const bData = {
        normal: { n: 'Обычный Скебоб', i: 100, p: 0, c: 'name-normal' },
        rare:   { n: 'Редкий Скебоб', i: 5000, p: 50000, c: 'name-rare' },
        epic:   { n: 'Эпический Скебоб', i: 52000, p: 200000, c: 'name-epic' },
        leg:    { n: 'Легендарный Скебоб', i: 500000, p: 1000000, c: 'name-leg' }
    };

    function showMsg(txt, isErr = true) {
        const t = document.getElementById('toast');
        t.innerText = txt; t.style.background = isErr ? "#e74c3c" : "#2ecc71";
        t.style.display = "block"; setTimeout(() => t.style.display="none", 2500);
    }

    function upUI() {
        document.getElementById('bal').innerText = Math.floor(beans).toLocaleString();
        document.getElementById('inc-dis').innerText = `Доход: ${Math.round((ai + bData[bob].i) * im).toLocaleString()} /ч`;
        document.getElementById('name').innerText = bData[bob].n;
        document.getElementById('name').className = bData[bob].c;
        document.getElementById('m-name').innerText = bData[bob].n;
        document.getElementById('cm-v').innerText = cm.toFixed(1);
    }

    function tap() { beans += (1 * cm); upUI(); }

    function buyU(t) {
        let cost = t === 'c' ? 1000 * cm : 2500 * (ai/100 + 1);
        if(beans < cost) return showMsg("Мало бобов!");
        beans -= cost;
        if(t === 'c') cm += 0.2; else ai += 100;
        showMsg("Улучшено!", false); upUI(); sendToBackend();
    }

    async function sendToBackend() {
        const uid = urlP.get('uid'); if(!uid) return;
        try {
            await fetch(`${SERVER_URL}/save`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true' // ПРОПУСК ЗАГЛУШКИ NGROK
                },
                body: JSON.stringify({ uid, beans, cm, im, cp: 1, ai, el: 10, lk: 0, bob })
            });
            console.log("Сохранение отправлено!");
        } catch (e) { console.error("Ошибка сохранения:", e); }
    }

    function openEgg(type) {
        let cost = type === 'rare_egg' ? 50000 : (type === 'epic_egg' ? 200000 : 1000000);
        if(beans < cost) return showMsg("Не хватает бобов!");
        beans -= cost;
        let rand = Math.random() * 100;
        let res = rand < 5 ? 'leg' : (rand < 30 ? 'epic' : 'rare');
        if(bData[res].i > bData[bob].i) { bob = res; showMsg(`ВЫБИТ: ${bData[res].n}!`, false); }
        else { beans += cost * 0.2; showMsg("Выпал слабый, продан за 20%"); }
        upUI(); sendToBackend();
    }

    function checkTask(t, r) {
        if(refs >= t) { beans += r; showMsg("Награда получена!", false); upUI(); sendToBackend(); }
        else showMsg("Нужно больше друзей!");
    }

    function sellBob() {
        if(bob === 'normal') return showMsg("Нельзя продать!");
        beans += bData[bob].p * 0.5; bob = 'normal';
        showMsg("Продано!", false); upUI(); sendToBackend();
    }

    function showT(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById('t_'+id).classList.add('active'); el.classList.add('active-nav');
    }

    setInterval(() => { beans += ((ai + bData[bob].i) * im) / 3600; upUI(); }, 1000);
    setInterval(sendToBackend, 15000); // Автосохранение каждые 15 сек
    upUI();
</script>
</body>
</html>
