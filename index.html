<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Skebob Cloud</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; user-select: none; overflow-x: hidden; }
        .header { background: #1e1e1e; padding: 15px; border-bottom: 2px solid gold; position: sticky; top: 0; z-index: 100; }
        .tab-content { display: none; padding: 20px; padding-bottom: 100px; }
        .active { display: block; }
        .card { background: #222; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; }
        button { background: gold; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; color: black; transition: 0.2s; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e1e1e; border-top: 1px solid #333; z-index: 100; overflow-x: auto; }
        .nav-item { flex: 1; min-width: 70px; padding: 15px 5px; font-size: 0.65em; color: #888; text-transform: uppercase; cursor: pointer; }
        .active-nav { color: gold; border-top: 2px solid gold; }
        #skebob-img { width: 180px; margin: 20px; transition: 0.1s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        #skebob-img:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div class="header">
    <h1 id="bal">0 🫘</h1>
    <div id="inc-dis">Доход: 0 /ч</div>
</div>

<!-- 1. МАГАЗИН -->
<div id="t_shop" class="tab-content">
    <h3>Яйца</h3>
    <div class="card">Редкое (50к)<button onclick="buyEgg('rare')">Открыть</button></div>
    <div class="card">Эпик (200к)<button onclick="buyEgg('epic')">Открыть</button></div>
    <div class="card">Легенда (1М)<button onclick="buyEgg('legendary')">Открыть</button></div>
</div>

<!-- 2. АПГРЕЙДЫ -->
<div id="t_upg" class="tab-content">
    <h3>Улучшения</h3>
    <div class="card">Сила клика (x<span id="cm-v">1.0</span>)<button onclick="buyU('c')">Улучшить</button></div>
    <div class="card">Сборщик (+100/ч)<button onclick="buyU('a')">Купить</button></div>
</div>

<!-- 3. СКЕБОБ (ГЛАВНАЯ) -->
<div id="t_main" class="tab-content active">
    <img id="skebob-img" src="skebob.jpg" onclick="tap()" onerror="this.src='https://via.placeholder.com'">
    <h2 id="name">Скебоб</h2>
</div>

<!-- 4. РЫНОК -->
<div id="t_mark" class="tab-content">
    <h3>Рынок</h3>
    <p>Выставление лотов временно недоступно</p>
</div>

<!-- 5. ЗАДАНИЯ -->
<div id="t_task" class="tab-content">
    <h3>Задания</h3>
    <div class="card">Подписаться на канал<button onclick="alert('Проверка...')">5,000 🫘</button></div>
</div>

<!-- 6. ПОДДЕРЖКА -->
<div id="t_supp" class="tab-content">
    <h3>Поддержка</h3>
    <p>Есть вопросы? Пиши админу!</p>
    <button onclick="window.open('https://t.me')">Связаться</button>
</div>

<nav class="nav">
    <div class="nav-item" onclick="showT('shop', this)">Магазин</div>
    <div class="nav-item" onclick="showT('upg', this)">Апгрейды</div>
    <div class="nav-item active-nav" onclick="showT('main', this)">Скебоб</div>
    <div class="nav-item" onclick="showT('mark', this)">Рынок</div>
    <div class="nav-item" onclick="showT('task', this)">Задания</div>
    <div class="nav-item" onclick="showT('supp', this)">Поддержка</div>
</nav>

<script>
    const urlP = new URLSearchParams(window.location.search);
    // ВСТАВЬ СВОЙ URL НИЖЕ (ОБЯЗАТЕЛЬНО С HTTPS)
    const SERVER_URL = "https://chi-patellar-ozell.ngrok-free.dev"; 

    // Загрузка данных из параметров URL (которые прислал бот)
    let beans = parseFloat(urlP.get('b')) || 0;
    let cm = parseFloat(urlP.get('cm')) || 1.0;
    let im = parseFloat(urlP.get('im')) || 1.0;
    let cp = parseInt(urlP.get('cp')) || 1;
    let ai = parseInt(urlP.get('ai')) || 0;
    let el = parseInt(urlP.get('el')) || 10;
    let lk = parseFloat(urlP.get('lk')) || 0;
    let bob = urlP.get('bob') || 'normal';

    const bData = {
        normal: { n: 'Скебоб', i: 0 },
        rare: { n: 'Редкий Скебоб', i: 1000 },
        epic: { n: 'Эпик Скебоб', i: 5000 },
        legendary: { n: 'Легенда Скебоб', i: 50000 }
    };

    function upUI() {
        document.getElementById('bal').innerText = Math.floor(beans).toLocaleString();
        let totalInc = Math.round((ai + bData[bob].i) * im);
        document.getElementById('inc-dis').innerText = "Доход: " + totalInc.toLocaleString() + " /ч";
        document.getElementById('name').innerText = bData[bob].n;
        document.getElementById('cm-v').innerText = cm.toFixed(1);
    }

    function tap() { beans += (cp * cm); upUI(); }

    function buyU(t) {
        if(beans < 1000) return alert("Нужно минимум 1000 бобов!");
        beans -= 1000;
        if(t==='c') cm += 0.2; 
        if(t==='a') ai += 100; 
        upUI();
        sendToBackend();
    }

    function showT(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById('t_'+id).classList.add('active'); 
        el.classList.add('active-nav');
    }

    async function sendToBackend() {
        const uid = urlP.get('uid');
        if(!uid) return;
        const data = { uid, beans, cm, im, cp, ai, el, lk, bob };
        try {
            await fetch(`${SERVER_URL}/save`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            console.log("Данные сохранены!");
        } catch (e) { console.error("Ошибка сохранения:", e); }
    }

    // Авто-майнинг и авто-сохранение
    setInterval(() => { beans += ((ai + bData[bob].i) * im) / 3600; upUI(); }, 1000);
    setInterval(sendToBackend, 10000); // Раз в 10 сек

    upUI();
</script>
</body>
</html>
