<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Skebob Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; user-select: none; overflow-x: hidden; }
        .header { background: #1e1e1e; padding: 15px; border-bottom: 2px solid gold; position: sticky; top: 0; z-index: 100; }
        #bal { font-size: 2em; margin: 0; color: gold; }
        #inc-dis { font-size: 0.85em; color: #aaa; margin-top: 5px; }
        .tab-content { display: none; padding: 20px; padding-bottom: 100px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: #222; padding: 15px; margin: 12px 0; border-radius: 16px; border: 1px solid #333; position: relative; }
        
        button { background: gold; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; color: black; margin-top: 5px; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e1e1e; border-top: 1px solid #333; z-index: 100; }
        .nav-item { flex: 1; padding: 15px 2px; font-size: 0.6em; color: #888; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .active-nav { color: gold; border-top: 3px solid gold; background: rgba(255,215,0,0.05); }
        
        #skebob-img { width: 180px; height: 180px; margin: 20px; border-radius: 50%; border: 4px solid #333; cursor: pointer; transition: 0.1s; object-fit: cover; }
        #skebob-img:active { transform: scale(0.9); }
        
        .toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 10px; display: none; z-index: 3000; width: 80%; font-weight: bold; background: rgba(255, 0, 0, 0.9); color: white; border: 1px solid white; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .toast.success { background: rgba(0, 200, 0, 0.9); }
    </style>
</head>
<body>

<!-- Уведомления -->
<div id="toast" class="toast"></div>

<!-- Шапка -->
<div class="header">
    <h1 id="bal">0 🫘</h1>
    <div id="inc-dis">Доход: 0 /ч</div>
</div>

<!-- ВКЛАДКИ -->
<div id="t_shop" class="tab-content">
    <h3>Инкубатор</h3>
    <div class="card"><h4>Редкое яйцо (50к)</h4><button onclick="showToast('Скоро в игре!')">Открыть</button></div>
    <div class="card"><h4>Эпик яйцо (200к)</h4><button onclick="showToast('Скоро в игре!')">Открыть</button></div>
</div>

<div id="t_upg" class="tab-content">
    <h3>Улучшения</h3>
    <div class="card">
        <h4>Сила клика (x<span id="cm-v">1.0</span>)</h4>
        <p style="font-size: 0.8em; color: #aaa;">Увеличивает добычу за один тап</p>
        <button id="btn-upg-click" onclick="buyU('c')">Улучшить (1,000 🫘)</button>
    </div>
    <div class="card">
        <h4>Авто-майнинг</h4>
        <button onclick="showToast('В разработке...')">Улучшить</button>
    </div>
</div>

<div id="t_main" class="tab-content active">
    <img id="skebob-img" src="skebob.jpg" onclick="tap()" onerror="this.src='https://via.placeholder.com/180?text=SKEBOB'">
    <h2 id="name">Скебоб</h2>
</div>

<div id="t_task" class="tab-content">
    <h3>Задания</h3>
    <div class="card">Друзья: <span id="ref-count">0</span></div>
    <div class="card">Пригласи 1 друга<button onclick="checkTask(1, 5000)">Проверить</button></div>
</div>

<div id="t_supp" class="tab-content">
    <h3>Поддержка</h3>
    <div class="card">
        <p>Нужна помощь?</p>
        <button onclick="openSupport()">Написать админу 🛠️</button>
    </div>
</div>

<!-- Навигация -->
<nav class="nav">
    <div class="nav-item" onclick="showT('shop', this)">Магазин</div>
    <div class="nav-item" onclick="showT('upg', this)">Апгрейды</div>
    <div class="nav-item active-nav" onclick="showT('main', this)">Скебоб</div>
    <div class="nav-item" onclick="showT('task', this)">Задания</div>
    <div class="nav-item" onclick="showT('supp', this)">Поддержка</div>
</nav>

<script>
    // --- ДАННЫЕ ИГРОКА ---
    const urlParams = new URLSearchParams(window.location.search);
    let user = {
        uid: urlParams.get('uid') || "0",
        beans: parseFloat(urlParams.get('b')) || 0,
        cm: parseFloat(urlParams.get('cm')) || 1.0,
        refs: parseInt(urlParams.get('refs')) || 0
    };

    // --- ОБНОВЛЕНИЕ ЭКРАНА ---
    function updateUI() {
        // Баланс
        document.getElementById('bal').innerText = Math.floor(user.beans).toLocaleString() + " 🫘";
        // Сила клика
        document.getElementById('cm-v').innerText = user.cm.toFixed(1);
        // Рефералы
        document.getElementById('ref-count').innerText = user.refs;

        // Цена улучшения клика (Сила клика * 1000)
        let clickPrice = Math.floor(user.cm * 1000);
        document.getElementById('btn-upg-click').innerText = `Улучшить (${clickPrice.toLocaleString()} 🫘)`;
    }

    // --- ЛОГИКА ТАПА ---
    function tap() {
        user.beans += (1 * user.cm);
        updateUI();
        // Сохраняем не каждый клик, а реже для скорости, или каждый раз:
        saveData(); 
    }

    // --- ПОКУПКА УЛУЧШЕНИЯ ---
    function buyU(type) {
        if (type === 'c') {
            let price = Math.floor(user.cm * 1000);

            if (user.beans >= price) {
                user.beans -= price;
                user.cm += 0.5; // Прибавляем 0.5 к силе клика
                showToast("Улучшено! Теперь сила: x" + user.cm.toFixed(1), true);
                updateUI();
                saveData();
            } else {
                let missing = price - Math.floor(user.beans);
                showToast("Недостаточно бобов! Нужно еще: " + missing.toLocaleString());
            }
        }
    }

    // --- ВКЛАДКИ ---
    function showT(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById('t_' + tabId).classList.add('active');
        el.classList.add('active-nav');
    }

    // --- УВЕДОМЛЕНИЯ ---
    function showToast(text, isSuccess = false) {
        const t = document.getElementById('toast');
        t.innerText = text;
        t.className = isSuccess ? "toast success" : "toast";
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    // --- ПОДДЕРЖКА ---
    function openSupport() {
        const supportLink = 'https://t.me/Ktotojko'; // ЗАМЕНИ НА СВОЙ НИК
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.openTelegramLink(supportLink);
        } else {
            window.open(supportLink, '_blank');
        }
    }

    // --- СОХРАНЕНИЕ НА СЕРВЕР ---
    async function saveData() {
        const API_URL = 'https://amvera-dfgbd-run-skebob.amvera.io'; // ЗАМЕНИ НА СВОЙ URL
        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    uid: user.uid,
                    beans: user.beans,
                    cm: user.cm,
                    im: 1.0, cp: 1, ai: 0, el: 10, lk: 0, bob: 'normal'
                })
            });
        } catch (e) {
            console.log("Ошибка сохранения");
        }
    }

    // Запуск
    updateUI();
    if(window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }
</script>

</body>
</html>
